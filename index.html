<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二下短語挑戰賽</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
        [hidden] { display: none !important; }
        .animate-pop-in { animation: pop-in 0.2s ease-out; }
        @keyframes pop-in { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .word-btn:active { transform: scale(0.95); }
        .answer-slot {
            min-width: 64px;
            border-bottom: 3px solid #6366f1;
            margin: 0 4px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s;
        }
    </style>
</head>
<body class="bg-indigo-50 min-h-screen flex items-center justify-center p-4">

    <!-- 設定畫面 -->
    <div id="setup-screen" class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md border border-slate-200">
        <div class="text-center mb-8">
            <div class="inline-block p-4 bg-indigo-100 rounded-full mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                </svg>
            </div>
            <h1 class="text-3xl font-black text-slate-800">二下短語挑戰賽</h1>
            <p class="text-slate-500 mt-2 font-medium">依據課文結構大全製作</p>
        </div>
        
        <div class="space-y-6">
            <div>
                <label class="block text-slate-700 font-bold mb-3 text-sm uppercase tracking-wider">選擇課次練習</label>
                <select id="lesson-select" class="w-full p-4 border-2 border-slate-100 rounded-2xl focus:outline-none focus:ring-4 focus:ring-indigo-100 text-lg bg-slate-50 transition-all cursor-pointer">
                    <option value="">請點擊選擇...</option>
                </select>
            </div>

            <button id="start-btn" disabled class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-5 rounded-2xl shadow-lg transition-all transform hover:-translate-y-1 disabled:opacity-30 disabled:hover:translate-y-0 text-xl">
                開始挑戰
            </button>
        </div>
    </div>

    <!-- 練習畫面 -->
    <div id="practice-screen" hidden class="bg-white p-6 sm:p-10 rounded-3xl shadow-2xl w-full max-w-3xl border border-slate-100 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-2 bg-indigo-600"></div>

        <div class="flex justify-between items-start mb-6 pt-4">
            <div class="flex flex-col">
                <span id="lesson-title" class="text-slate-400 text-xs font-bold tracking-widest uppercase mb-1">正在進行</span>
                <div class="text-indigo-600 font-black text-xl" id="progress-tag">進度 1 / 2</div>
            </div>
            <div class="bg-indigo-50 px-4 py-2 rounded-xl text-center">
                <span class="text-slate-500 text-xs font-bold block mb-1">目前得分</span>
                <span class="text-2xl font-black text-indigo-700" id="current-score-display">0</span>
            </div>
        </div>

        <!-- 核心練習區 -->
        <div class="mb-10 space-y-6">
            <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100 space-y-3">
                <div class="flex items-center gap-2">
                    <span class="bg-indigo-600 text-white text-xs px-2 py-1 rounded-md">例句</span>
                    <p id="example-sentence" class="text-xl font-bold text-indigo-600"></p>
                </div>
                <div class="flex items-start gap-2">
                    <span class="bg-slate-500 text-white text-xs px-2 py-1 rounded-md mt-1">結構</span>
                    <h2 id="structure-hint" class="text-lg font-bold text-slate-700 leading-tight"></h2>
                </div>
                <div id="desc-box" class="text-sm text-slate-500 bg-white p-3 rounded-lg border border-slate-100">
                    <span class="font-bold">說明：</span><span id="structure-desc"></span>
                </div>
            </div>
            
            <div id="answer-container" class="bg-white border-2 border-indigo-50 rounded-3xl p-8 min-h-[140px] flex flex-wrap justify-center items-center gap-y-6 shadow-inner">
                <div id="answer-zone" class="flex flex-wrap justify-center items-center gap-x-1 gap-y-4">
                </div>
            </div>
        </div>

        <!-- 詞語選擇區 -->
        <div class="mb-8">
            <p class="text-center text-slate-400 text-xs font-bold mb-4 tracking-widest uppercase">請點選下方詞語組合成正確短語</p>
            <div id="word-pool" class="flex flex-wrap justify-center gap-3">
            </div>
        </div>

        <!-- 控制按鈕 -->
        <div class="flex flex-col sm:flex-row gap-4">
            <button id="clear-btn" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-4 rounded-2xl transition-all">
                清除重選
            </button>
            <button id="check-btn" class="flex-[2] bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-xl transition-all text-lg">
                確認答案
            </button>
        </div>
    </div>

    <!-- 結果畫面 -->
    <div id="results-screen" hidden class="bg-white p-12 rounded-3xl shadow-2xl w-full max-w-md text-center animate-pop-in border border-slate-100">
        <div id="score-emoji" class="text-8xl mb-6">🌟</div>
        <h2 class="text-3xl font-black text-slate-800 mb-2">挑戰完成！</h2>
        <p id="result-comment" class="text-slate-500 font-medium mb-10"></p>

        <div class="bg-indigo-50 rounded-3xl p-8 mb-10">
            <div class="text-6xl font-black text-indigo-600 mb-1" id="final-score-text">0</div>
            <div class="text-slate-400 font-bold tracking-widest text-sm uppercase">最終得分</div>
        </div>

        <div class="grid grid-cols-1 gap-4">
            <button id="retry-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-5 rounded-2xl shadow-lg transition-all">
                重新挑戰
            </button>
            <button id="home-btn" class="bg-slate-100 hover:bg-slate-200 text-slate-500 font-bold py-4 rounded-2xl transition-all">
                返回主選單
            </button>
        </div>
    </div>

    <script>
        const lessonsData = [
            {
                id: 1, title: "第一課：種子旅行真奇妙",
                items: [
                    { struct: "名詞（誰）+ 疊字副詞（怎麼樣）+ 動詞（動作）", desc: "利用疊字副詞來強調動作。", example: "車子快快跑", chunks: ["風兒", "輕輕", "吹"] },
                    { struct: "名詞（誰）+ 疊字副詞（怎麼樣）+ 動詞（動作）", desc: "利用疊字副詞來強調動作。", example: "車子快快跑", chunks: ["蝸牛", "慢慢", "爬"] }
                ]
            },
            {
                id: 2, title: "第二課：小水滴愛上探險",
                items: [
                    { struct: "更 + 形容詞（怎麼樣）+ 的 + 名詞（什麼事物）", desc: "用「更」強調程度加深。", example: "更新奇的探險", chunks: ["更", "美麗", "的", "風景"] },
                    { struct: "更 + 形容詞（怎麼樣）+ 的 + 名詞（什麼事物）", desc: "用「更」強調程度加深。", example: "更新奇的探險", chunks: ["更", "好玩", "的", "遊戲"] }
                ]
            },
            {
                id: 3, title: "第三課：紫斑蝶向北飛",
                items: [
                    { struct: "一 + 疊字量詞 + 動詞（動作）+ 名詞（地方）", desc: "利用疊字量詞表示數量很多。", example: "一隻隻飛上天空", chunks: ["一朵朵", "開在", "路邊"] },
                    { struct: "一 + 疊字量詞 + 動詞（動作）+ 名詞（地方）", desc: "利用疊字量詞表示數量很多。", example: "一隻隻飛上天空", chunks: ["一件件", "放進", "衣櫃"] }
                ]
            },
            {
                id: 4, title: "第四課：一場雨",
                items: [
                    { struct: "不 + 形容詞 + 也不 + 相反的形容詞", desc: "表達「剛剛好」的意思。", example: "不多也不少", chunks: ["不", "冷", "也", "不", "熱"] },
                    { struct: "想 + 動詞（動作）+ 形容詞（怎麼樣）+ 的 + 名詞（什麼事物）", desc: "表達想要做的事情。", example: "想爬出淹水的家", chunks: ["想", "做出", "酥脆", "的", "餅乾"] }
                ]
            },
            {
                id: 5, title: "第五課：大自然的雕刻家",
                items: [
                    { struct: "形容詞（怎麼樣）+ 的 + 名詞（什麼事物）+ 名詞（什麼事物）", desc: "同時描述兩樣事物。", example: "有趣的圖畫故事", chunks: ["神奇", "的", "風刀", "水劍"] },
                    { struct: "形容詞（怎麼樣）+ 的 + 名詞（什麼事物）+ 名詞（什麼事物）", desc: "同時描述兩樣事物。", example: "有趣的圖畫故事", chunks: ["美麗", "的", "花草", "樹木"] }
                ]
            },
            {
                id: 6, title: "第六課：最後的一棵樹",
                items: [
                    { struct: "動詞（動作）+ 著 + 形容詞（怎麼樣）+ 的 + 名詞（什麼事物）", desc: "表示動作正在進行且包含對事物的描述。", example: "看著燦爛的陽光", chunks: ["吹著", "涼爽", "的", "微風"] },
                    { struct: "動詞（動作）+ 著 + 形容詞（怎麼樣）+ 的 + 名詞（什麼事物）", desc: "表示動作正在進行且包含對事物的描述。", example: "看著燦爛的陽光", chunks: ["唱著", "動聽", "的", "歌曲"] }
                ]
            },
            {
                id: 7, title: "第七課：蜘蛛救蛋",
                items: [
                    { struct: "一 + 量詞 + 形容詞（怎麼樣）+ 的 + 名詞（什麼事物）", desc: "使用量詞和形容詞詳細描述事物。", example: "一個特別的禮物", chunks: ["一", "道", "細長", "的", "裂痕"] },
                    { struct: "一 + 量詞 + 形容詞（怎麼樣）+ 的 + 名詞（什麼事物）", desc: "使用量詞和形容詞詳細描述事物。", example: "一個特別的禮物", chunks: ["一", "塊", "美味", "的", "蛋糕"] }
                ]
            },
            {
                id: 8, title: "第八課：國王與明珠",
                items: [
                    { struct: "動詞（動作）+ 了 + 數量 + 量詞 + 形容詞（怎麼樣）+ 的 + 名詞（什麼事物）", desc: "描述採集或獲得某物的過程與細節。", example: "採了幾朵漂亮的鮮花", chunks: ["換了", "幾顆", "閃亮", "的", "明珠"] },
                    { struct: "動詞（動作）+ 了 + 數量 + 量詞 + 形容詞（怎麼樣）+ 的 + 名詞（什麼事物）", desc: "描述採集或獲得某物的過程與細節。", example: "採了幾朵漂亮的鮮花", chunks: ["買了", "幾本", "有趣", "的", "故事書"] }
                ]
            },
            {
                id: 9, title: "第九課：成功不必在我",
                items: [
                    { struct: "疊字動詞（動作）+ 一 + 疊字動詞（動作）", desc: "表示短暫或試探性的動作。", example: "聽一聽", chunks: ["聞", "一", "聞"] },
                    { struct: "疊字動詞（動作）+ 一 + 疊字動詞（動作）", desc: "表示短暫或試探性的動作。", example: "聽一聽", chunks: ["看", "一", "看"] }
                ]
            },
            {
                id: 10, title: "第十課：我愛看書",
                items: [
                    { struct: "疊字形容詞（怎麼樣）+ 的 + 名詞（什麼事物）", desc: "使用疊字形容詞強調特徵。", example: "紅通通的臉蛋", chunks: ["廣大大", "的", "世界"] },
                    { struct: "疊字形容詞（怎麼樣）+ 的 + 名詞（什麼事物）", desc: "使用疊字形容詞強調特徵。", example: "紅通通的臉蛋", chunks: ["綠油油", "的", "草地"] }
                ]
            },
            {
                id: 11, title: "第十一課：小青蛙想長大",
                items: [
                    { struct: "疊字形容詞 + 疊字形容詞 + 的 + 動詞（動作）", desc: "描述動作進行時的狀態。", example: "乾乾淨淨的打掃", chunks: ["舒舒服服", "的", "睡覺"] },
                    { struct: "疊字形容詞 + 疊字形容詞 + 的 + 動詞（動作）", desc: "描述動作進行時的狀態。", example: "乾乾淨淨的打掃", chunks: ["開開心心", "的", "玩耍"] }
                ]
            },
            {
                id: 12, title: "第十二課：小紙船",
                items: [
                    { struct: "動詞（動作）+ 名詞（事物）+ 到 + 名詞（地方）", desc: "表示將某物移動到特定地點。", example: "送禮物到家裡", chunks: ["摺", "紙船", "到", "海邊"] },
                    { struct: "動詞（動作）+ 名詞（事物）+ 到 + 名詞（地方）", desc: "表示將某物移動到特定地點。", example: "送禮物到家裡", chunks: ["寄", "卡片", "到", "國外"] }
                ]
            }
        ];

        let state = {
            currentLesson: null,
            questions: [],
            currentIndex: 0,
            correctCount: 0,
            selectedChunks: []
        };

        const elements = {
            setup: document.getElementById('setup-screen'),
            practice: document.getElementById('practice-screen'),
            results: document.getElementById('results-screen'),
            lessonSelect: document.getElementById('lesson-select'),
            startBtn: document.getElementById('start-btn'),
            wordPool: document.getElementById('word-pool'),
            answerZone: document.getElementById('answer-zone'),
            progress: document.getElementById('progress-tag'),
            struct: document.getElementById('structure-hint'),
            structDesc: document.getElementById('structure-desc'),
            example: document.getElementById('example-sentence'),
            lessonTitle: document.getElementById('lesson-title'),
            currentScore: document.getElementById('current-score-display'),
            finalScore: document.getElementById('final-score-text'),
            emoji: document.getElementById('score-emoji'),
            comment: document.getElementById('result-comment')
        };

        function init() {
            lessonsData.forEach(l => {
                const opt = document.createElement('option');
                opt.value = l.id;
                opt.textContent = l.title;
                elements.lessonSelect.appendChild(opt);
            });
        }

        elements.lessonSelect.onchange = () => {
            elements.startBtn.disabled = !elements.lessonSelect.value;
        };

        elements.startBtn.onclick = () => {
            const id = parseInt(elements.lessonSelect.value);
            const lesson = lessonsData.find(l => l.id === id);
            state.currentLesson = lesson;
            state.questions = [...lesson.items].sort(() => Math.random() - 0.5);
            state.currentIndex = 0;
            state.correctCount = 0;
            renderQuestion();
            showScreen('practice');
        };

        function renderQuestion() {
            const q = state.questions[state.currentIndex];
            state.selectedChunks = [];
            
            elements.lessonTitle.textContent = state.currentLesson.title;
            elements.progress.textContent = `進度 ${state.currentIndex + 1} / ${state.questions.length}`;
            elements.struct.textContent = q.struct;
            elements.structDesc.textContent = q.desc;
            elements.example.textContent = q.example;
            elements.currentScore.textContent = Math.round((state.correctCount / state.questions.length) * 100);
            
            elements.wordPool.innerHTML = '';
            elements.answerZone.innerHTML = '';

            q.chunks.forEach(() => {
                const slot = document.createElement('div');
                slot.className = "answer-slot h-16 sm:h-20 bg-slate-50 border-b-4 border-slate-200 text-2xl font-black text-indigo-700";
                elements.answerZone.appendChild(slot);
            });

            const shuffled = [...q.chunks].sort(() => Math.random() - 0.5);
            shuffled.forEach(text => {
                const btn = document.createElement('button');
                btn.className = "word-btn bg-white border-2 border-slate-100 px-5 py-3 rounded-xl shadow-sm hover:border-indigo-400 hover:bg-indigo-50 transition-all font-bold text-slate-700 text-lg animate-pop-in";
                btn.textContent = text;
                btn.onclick = () => addToAnswer(text, btn);
                elements.wordPool.appendChild(btn);
            });
        }

        function addToAnswer(text, btn) {
            if (state.selectedChunks.length >= state.questions[state.currentIndex].chunks.length) return;

            const slotIndex = state.selectedChunks.length;
            const slots = elements.answerZone.querySelectorAll('.answer-slot');
            
            state.selectedChunks.push(text);
            btn.classList.add('opacity-30', 'pointer-events-none');

            slots[slotIndex].textContent = text;
            slots[slotIndex].classList.remove('border-slate-200');
            slots[slotIndex].classList.add('border-indigo-600', 'animate-pop-in');
        }

        document.getElementById('clear-btn').onclick = () => renderQuestion();

        document.getElementById('check-btn').onclick = () => {
            const q = state.questions[state.currentIndex];
            if (state.selectedChunks.length < q.chunks.length) return;

            const isCorrect = state.selectedChunks.join('') === q.chunks.join('');
            if (isCorrect) state.correctCount++;
            
            showToast(isCorrect, isCorrect ? "正確！你真棒 🌟" : `答案是：${q.chunks.join('')}`);

            state.currentIndex++;
            setTimeout(() => {
                if (state.currentIndex < state.questions.length) {
                    renderQuestion();
                } else {
                    finish();
                }
            }, 1600);
        };

        function showToast(success, msg) {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-10 left-1/2 transform -translate-x-1/2 px-8 py-4 rounded-2xl shadow-2xl font-bold text-white z-50 animate-pop-in ${success ? 'bg-emerald-500' : 'bg-rose-500'}`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 1500);
        }

        function finish() {
            const score = Math.round((state.correctCount / state.questions.length) * 100);
            elements.finalScore.textContent = score;

            if (score === 100) {
                elements.emoji.textContent = "🏆";
                elements.comment.textContent = "太厲害了！你已經完全掌握這課的短語結構！";
            } else if (score >= 50) {
                elements.emoji.textContent = "👏";
                elements.comment.textContent = "做得好！再練習幾次就會更熟練喔！";
            } else {
                elements.emoji.textContent = "💪";
                elements.comment.textContent = "加油！觀察結構和例句的關聯，再挑戰一次！";
            }

            showScreen('results');
        }

        function showScreen(name) {
            elements.setup.hidden = true;
            elements.practice.hidden = true;
            elements.results.hidden = true;
            elements[name].hidden = false;
        }

        document.getElementById('home-btn').onclick = () => showScreen('setup');
        document.getElementById('retry-btn').onclick = () => elements.startBtn.click();

        init();
    </script>
</body>
</html>
